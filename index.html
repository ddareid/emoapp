<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>EmoApp</title>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDXfq_-PwhKjv2XwDBigYVovu6BSpDrP0Y",
  authDomain: "emoapp-e9ae1.firebaseapp.com",
  projectId: "emoapp-e9ae1",
  storageBucket: "emoapp-e9ae1.firebasestorage.app",
  messagingSenderId: "652294992778",
  appId: "1:652294992778:web:7eb131c771fcb04cc24e73"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let usuarioActual = "";
let emocion = "";
let datosGlobales = [];

// REGISTRO
window.registrarse = function() {
  let user = document.getElementById("usuario").value;
  let pass = document.getElementById("password").value;

  if (!user || !pass) return alert("Completa los campos");

  localStorage.setItem(user, pass);
  alert("Registrado");
};

// LOGIN
window.iniciarSesion = function() {
  let user = document.getElementById("usuario").value;
  let pass = document.getElementById("password").value;

  if (user === "admin123" && pass === "admin123") {
    mostrar("profe");
    cargarProfe();
    return;
  }

  let guardado = localStorage.getItem(user);

  if (guardado !== pass) return alert("Error");

  usuarioActual = user;
  mostrar("app");
  cargarHistorial();
};

// CAMBIO DE PANTALLA CON ANIMACIÓN
function mostrar(seccion) {
  ["login","app","profe"].forEach(id=>{
    document.getElementById(id).style.display="none";
  });
  let el = document.getElementById(seccion);
  el.style.display="block";
  el.classList.add("fade");
}

// EMOCION
window.setEmocion = function(e) {
  emocion = e;
};

// GUARDAR
window.guardar = async function() {
  let comentario = document.getElementById("comentario").value;
  let archivo = document.getElementById("tarea").files[0];

  if (!emocion) return alert("Selecciona emoción");
  if (!archivo) return alert("Sube la tarea");

  await addDoc(collection(db, "emociones"), {
    usuario: usuarioActual,
    emocion,
    comentario,
    tarea: archivo.name,
    fecha: new Date()
  });

  alert("Guardado 🔥");
  cargarHistorial();
};

// HISTORIAL
async function cargarHistorial() {
  let lista = document.getElementById("historial");
  lista.innerHTML = "";

  const data = await getDocs(collection(db,"emociones"));

  data.forEach(doc=>{
    let d = doc.data();
    if(d.usuario===usuarioActual){
      let li=document.createElement("li");
      li.textContent=`${d.emocion} - ${d.comentario}`;
      lista.appendChild(li);
    }
  });
}

// PROFE
async function cargarProfe(){
  let lista=document.getElementById("listaProfe");
  lista.innerHTML="";
  datosGlobales=[];

  const data=await getDocs(collection(db,"emociones"));

  data.forEach(doc=>{
    let d=doc.data();
    datosGlobales.push(d);

    let li=document.createElement("li");
    li.textContent=`${d.usuario}: ${d.emocion}`;
    lista.appendChild(li);
  });
}

// FILTRO
window.filtrar=function(){
  let t=document.getElementById("buscador").value.toLowerCase();
  let lista=document.getElementById("listaProfe");
  lista.innerHTML="";

  datosGlobales.forEach(d=>{
    if(d.usuario.toLowerCase().includes(t)){
      let li=document.createElement("li");
      li.textContent=`${d.usuario}: ${d.emocion}`;
      lista.appendChild(li);
    }
  });
};

// LOGOUT
window.cerrarSesion=function(){
  mostrar("login");
};
</script>

<style>
body {
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#667eea,#764ba2);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* TARJETA */
.app{
  background:white;
  width:340px;
  border-radius:25px;
  padding:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
  text-align:center;
}

/* ANIMACION */
.fade{
  animation:fadeIn 0.4s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

/* INPUT */
input{
  width:100%;
  padding:10px;
  margin-top:8px;
  border-radius:10px;
  border:1px solid #ddd;
}

/* BOTONES TAP */
button{
  margin-top:10px;
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  background:#667eea;
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition:0.2s;
}

button:active{
  transform:scale(0.95);
  background:#5a67d8;
}

/* EMOCIONES */
.emociones button{
  width:60px;
  height:60px;
  font-size:24px;
  border-radius:50%;
  margin:5px;
  background:#f1f1f1;
  color:black;
}

.emociones button:active{
  transform:scale(1.2);
  background:#667eea;
  color:white;
}

/* LISTA */
ul{
  text-align:left;
  max-height:120px;
  overflow:auto;
}
</style>
</head>

<body>

<div class="app" id="login">
  <h2>Login</h2>
  <input id="usuario" placeholder="Usuario">
  <input id="password" type="password" placeholder="Contraseña">
  <button onclick="iniciarSesion()">Entrar</button>
  <button onclick="registrarse()">Registrarse</button>
</div>

<div class="app" id="app" style="display:none;">
  <h2>Mi día emocional</h2>

  <div class="emociones">
    <button onclick="setEmocion('😊')">😊</button>
    <button onclick="setEmocion('😐')">😐</button>
    <button onclick="setEmocion('😢')">😢</button>
    <button onclick="setEmocion('😡')">😡</button>
    <button onclick="setEmocion('😴')">😴</button>
    <button onclick="setEmocion('😰')">😰</button>
    <button onclick="setEmocion('🥳')">🥳</button>
    <button onclick="setEmocion('😎')">😎</button>
    <button onclick="setEmocion('😞')">😞</button>
    <button onclick="setEmocion('🤒')">🤒</button>
    <button onclick="setEmocion('😍')">😍</button>
    <button onclick="setEmocion('😤')">😤</button>
  </div>

  <input id="comentario" placeholder="¿Qué pasó hoy?">
  <input type="file" id="tarea">

  <button onclick="guardar()">Guardar</button>
  <button onclick="cerrarSesion()">Salir</button>

  <ul id="historial"></ul>
</div>

<div class="app" id="profe" style="display:none;">
  <h2>Panel profesor</h2>

  <input id="buscador" placeholder="Buscar alumno..." onkeyup="filtrar()">

  <button onclick="cerrarSesion()">Salir</button>

  <ul id="listaProfe"></ul>
</div>

</body>
</html>
