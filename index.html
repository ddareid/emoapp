<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>EmoApp</title>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDXfq_-PwhKjv2XwDBigYVovu6BSpDrP0Y",
  authDomain: "emoapp-e9ae1.firebaseapp.com",
  projectId: "emoapp-e9ae1",
  storageBucket: "emoapp-e9ae1.firebasestorage.app",
  messagingSenderId: "652294992778",
  appId: "1:652294992778:web:7eb131c771fcb04cc24e73"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let usuarioActual = "";
let emocion = "";
let datosGlobales = [];

// REGISTRO
window.registrarse = function() {
  let user = document.getElementById("usuario").value;
  let pass = document.getElementById("password").value;

  if (!user || !pass) {
    alert("Completa todos los campos");
    return;
  }

  localStorage.setItem(user, pass);
  alert("Usuario registrado");
};

// LOGIN
window.iniciarSesion = function() {
  let user = document.getElementById("usuario").value;
  let pass = document.getElementById("password").value;

  // PROFE OCULTO
  if (user === "admin123" && pass === "admin123") {
    document.getElementById("login").style.display = "none";
    document.getElementById("profe").style.display = "block";
    cargarProfe();
    return;
  }

  let guardado = localStorage.getItem(user);

  if (!guardado || guardado !== pass) {
    alert("Datos incorrectos");
    return;
  }

  usuarioActual = user;
  document.getElementById("login").style.display = "none";
  document.getElementById("app").style.display = "block";
  cargarHistorial();
};

// EMOCION
window.setEmocion = function(e) {
  emocion = e;
};

// GUARDAR
window.guardar = async function() {
  let comentario = document.getElementById("comentario").value;
  let archivo = document.getElementById("tarea").files[0];

  if (!emocion) {
    alert("Selecciona emoción");
    return;
  }

  if (!archivo) {
    alert("Debes subir la tarea obligatoria");
    return;
  }

  await addDoc(collection(db, "emociones"), {
    usuario: usuarioActual,
    emocion: emocion,
    comentario: comentario,
    tarea: archivo.name,
    fecha: new Date()
  });

  alert("Guardado en internet 🔥");
  cargarHistorial();
};

// HISTORIAL
async function cargarHistorial() {
  let lista = document.getElementById("historial");
  lista.innerHTML = "";

  const querySnapshot = await getDocs(collection(db, "emociones"));

  querySnapshot.forEach((doc) => {
    let data = doc.data();

    if (data.usuario === usuarioActual) {
      let li = document.createElement("li");
      li.textContent = data.emocion + " - " + data.comentario + " (📄 " + data.tarea + ")";
      lista.appendChild(li);
    }
  });
}

// PROFE
async function cargarProfe() {
  let lista = document.getElementById("listaProfe");
  lista.innerHTML = "";
  datosGlobales = [];

  const querySnapshot = await getDocs(collection(db, "emociones"));

  querySnapshot.forEach((doc) => {
    let data = doc.data();
    datosGlobales.push(data);

    let li = document.createElement("li");
    li.textContent = data.usuario + ": " + data.emocion + " - " + data.comentario + " (📄 " + data.tarea + ")";
    lista.appendChild(li);
  });
}

// FILTRO
window.filtrar = function() {
  let texto = document.getElementById("buscador").value.toLowerCase();
  let lista = document.getElementById("listaProfe");
  lista.innerHTML = "";

  datosGlobales.forEach(d => {
    if (d.usuario.toLowerCase().includes(texto)) {
      let li = document.createElement("li");
      li.textContent = d.usuario + ": " + d.emocion + " - " + d.comentario + " (📄 " + d.tarea + ")";
      lista.appendChild(li);
    }
  });
};

// LOGOUT
window.cerrarSesion = function() {
  document.getElementById("login").style.display = "block";
  document.getElementById("app").style.display = "none";
  document.getElementById("profe").style.display = "none";
};
</script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #667eea, #764ba2);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.app {
  background: white;
  width: 340px;
  border-radius: 25px;
  padding: 20px;
}

button { margin-top: 5px; width: 100%; padding: 10px; }

.emociones button {
  width: auto;
  margin: 3px;
}

input {
  width: 100%;
  padding: 8px;
  margin-top: 5px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="app" id="login">
  <h2>Login</h2>
  <input type="text" id="usuario" placeholder="Usuario">
  <input type="password" id="password" placeholder="Contraseña">
  
  <button onclick="iniciarSesion()">Entrar</button>
  <button onclick="registrarse()">Registrarse</button>
</div>

<!-- APP -->
<div class="app" id="app" style="display:none;">
  <h2>Mi día emocional</h2>

  <div class="emociones">
    <button onclick="setEmocion('😊 Feliz')">😊</button>
    <button onclick="setEmocion('😐 Neutral')">😐</button>
    <button onclick="setEmocion('😢 Triste')">😢</button>
    <button onclick="setEmocion('😡 Enojado')">😡</button>
    <button onclick="setEmocion('😴 Cansado')">😴</button>
    <button onclick="setEmocion('😰 Ansioso')">😰</button>
    <button onclick="setEmocion('🥳 Emocionado')">🥳</button>
    <button onclick="setEmocion('😎 Motivado')">😎</button>
    <button onclick="setEmocion('😞 Decepcionado')">😞</button>
    <button onclick="setEmocion('🤒 Enfermo')">🤒</button>
    <button onclick="setEmocion('😍 Feliz extremo')">😍</button>
    <button onclick="setEmocion('😤 Estresado')">😤</button>
  </div>

  <input type="text" id="comentario" placeholder="¿Qué pasó hoy?">

  <h4>📌 Tarea obligatoria</h4>
  <input type="file" id="tarea">

  <button onclick="guardar()">Guardar</button>
  <button onclick="cerrarSesion()">Cerrar sesión</button>

  <ul id="historial"></ul>
</div>

<!-- PROFESOR -->
<div class="app" id="profe" style="display:none;">
  <h2>Panel profesor</h2>

  🔍 <input type="text" id="buscador" placeholder="Buscar alumno..." onkeyup="filtrar()">

  <button onclick="cerrarSesion()">Cerrar sesión</button>

  <ul id="listaProfe"></ul>
</div>

</body>
</html>
